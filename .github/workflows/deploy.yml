name: deploy

on:
  pull_request:
    paths-ignore: ["**.md"]
  push:
    branches: [main]
    paths-ignore: ["**.md"]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

env:
  REGION: europe-west1
  SERVICE: quake-pipeline

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r app/requirements.txt
      - run: python tests/test_scoring.py

  terraform:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_CI_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3

      - run: terraform init

      - if: github.event_name == 'pull_request'
        run: terraform plan

      - if: github.event_name == 'push'
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - if: github.event_name == 'push'
        working-directory: .
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE }}/${{ env.SERVICE }}:${{ github.sha }}
          docker build -t "$IMAGE" app/
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - if: github.event_name == 'push'
        run: terraform apply -auto-approve -var="image=${{ env.IMAGE }}"
